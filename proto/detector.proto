// GuardX detector contract (spec §4.3).
//
// M1 wire encoding: HTTP + protobuf-JSON (identical field names). Real gRPC
// is a drop-in swap; the message shapes here are the contract either way.
syntax = "proto3";

package guardx.detector.v1;

option go_package = "github.com/guardx/gateway/internal/detector/proto;detectorpb";

service Detector {
  rpc Check (CheckRequest) returns (CheckResponse);
  rpc CheckStream (stream StreamChunk) returns (stream CheckResponse); // M2+
  rpc Health (HealthRequest) returns (HealthResponse);
}

enum Direction {
  DIRECTION_UNSPECIFIED = 0;
  INPUT = 1;
  OUTPUT = 2;
}

enum Verdict {
  VERDICT_UNSPECIFIED = 0;
  PASS = 1;
  FAIL = 2;
  ERROR = 3;
  NEEDS_ESCALATION = 4;
}

message ContextDoc {
  string id = 1;
  string text = 2;
  string source = 3;
}

message CheckRequest {
  string request_id = 1;
  string text = 2;
  Direction direction = 3;
  bytes config = 4;                  // guard.config as canonical JSON
  repeated ContextDoc context = 5;
  map<string, string> metadata = 6;
  uint32 deadline_ms = 7;
}

message Span {
  uint32 start = 1;                  // byte offset, UTF-8
  uint32 end = 2;
  string label = 3;                  // e.g. SSN, AWS_ACCESS_KEY
  float confidence = 4;              // 0..1
}

message CheckResponse {
  string detector_version = 1;
  float score = 2;                   // 0..1 risk (1 = certain violation)
  Verdict verdict = 3;
  repeated Span spans = 4;
  string explanation = 5;
  uint32 latency_ms = 6;
}

message StreamChunk {
  string request_id = 1;
  bytes text = 2;
  uint64 offset = 3;
  bool eof = 4;
}

message HealthRequest {}

message HealthResponse {
  string detector_id = 1;
  string detector_version = 2;
  string status = 3;                 // "ok" | "degraded"
  map<string, string> versions = 4;  // ruleset, model, entity_pack digests
}

{{- range $key, $spec := .Values.detectors }}
{{- if $spec.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "guardx.fullname" $ }}-detector-{{ $key }}
  labels:
    {{- include "guardx.labels" $ | nindent 4 }}
    app.kubernetes.io/component: detector
    guardx.io/detector: {{ $key }}
spec:
  replicas: {{ $spec.replicaCount }}
  selector:
    matchLabels: { app: {{ include "guardx.fullname" $ }}-detector-{{ $key }} }
  template:
    metadata:
      labels:
        app: {{ include "guardx.fullname" $ }}-detector-{{ $key }}
        {{- include "guardx.labels" $ | nindent 8 }}
    spec:
      containers:
        - name: detector
          image: {{ include "guardx.image" (dict "root" $ "repo" $spec.image.repository) }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $spec.service.port }}
          {{- if and (eq $key "safety") $spec.env }}
          env:
            {{- if $spec.env.togetherApiKeySecret }}
            - name: TOGETHER_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $spec.env.togetherApiKeySecret }}
                  key: TOGETHER_AI_API_KEY
            {{- end }}
            {{- if $spec.env.deepInfraApiKeySecret }}
            - name: DEEPINFRA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $spec.env.deepInfraApiKeySecret }}
                  key: DEEPINFRA_API_KEY
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml $spec.resources | nindent 12 }}
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "guardx.fullname" $ }}-detector-{{ $key }}
  labels:
    {{- include "guardx.labels" $ | nindent 4 }}
    app.kubernetes.io/component: detector
spec:
  type: ClusterIP
  ports:
    - port: {{ $spec.service.port }}
      targetPort: {{ $spec.service.port }}
      name: http
  selector:
    app: {{ include "guardx.fullname" $ }}-detector-{{ $key }}
{{- end }}
{{- end }}

# M0 dev profile. Build context = repo root so we can COPY schemas/ etc.
# Run from repo root:  docker compose -f deploy/compose/docker-compose.yml up --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: guardx
      POSTGRES_PASSWORD: guardx
      POSTGRES_DB: guardx
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardx -d guardx"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - guardx-pg:/var/lib/postgresql/data

  control:
    build:
      context: ../..
      dockerfile: control/Dockerfile
    environment:
      GUARDX_DATABASE_URL: postgresql+psycopg://guardx:guardx@postgres:5432/guardx
      GUARDX_SIGNING_KEY_PATH: /data/dev-signing-key.ed25519
      GUARDX_SIGNING_KEY_ID: dev-local
      GUARDX_API_KEY_ADMIN: dev-admin-key
      GUARDX_API_KEY_SERVICE: dev-service-key
      GUARDX_SCHEMAS_DIR: /schemas
      GUARDX_CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
    depends_on:
      postgres:
        condition: service_healthy
    ports: ["8080:8080"]
    volumes:
      - guardx-signing:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')\""]
      interval: 2s
      timeout: 3s
      retries: 30

  upstream:
    build:
      context: ../..
      dockerfile: deploy/compose/upstream/Dockerfile
    ports: ["9000:9000"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/healthz')\""]
      interval: 2s
      timeout: 3s
      retries: 15

  pii:
    build:
      context: ../..
      dockerfile: detectors/pii/Dockerfile
    ports: ["9100:9100"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9100/healthz')\""]
      interval: 2s
      timeout: 3s
      retries: 15

  gateway:
    build:
      context: ../..
      dockerfile: gateway/Dockerfile
    environment:
      GUARDX_GATEWAY_ADDR: ":8081"
      GUARDX_CONTROL_BASE_URL: http://control:8080
      GUARDX_CONTROL_API_KEY: dev-service-key
      GUARDX_TENANT: acme
      GUARDX_ENV: prod
      GUARDX_SIGNING_KEY_ID: dev-local
      GUARDX_UPSTREAM_BASE_URL: http://upstream:9000
      GUARDX_PII_BACKEND_URL: http://pii:9100
      GUARDX_BUNDLE_POLL_INTERVAL: 2s
    depends_on:
      control:
        condition: service_healthy
      upstream:
        condition: service_healthy
      pii:
        condition: service_healthy
    ports: ["8081:8081"]

volumes:
  guardx-pg:
  guardx-signing:

# GuardX CI — the load-bearing pipeline.
#
# Fail-conditions the plan calls out:
#   • Any test failure across Go / Python / TS
#   • k6 p95 latency budget breach (spec §4.1)
#   • Bundle verification refusing an unpinned detector (spec §6)
#   • CORS misconfiguration surfaced by config validation
#
# Not run here: pen test, license scanning, cosign signing — those live in a
# release workflow gated by a tag push.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - name: Test gateway
        run: cd gateway && go test ./...

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install + test control
        run: |
          cd control && pip install -e ".[dev]"
          pytest -q
      - name: Install + test detectors
        run: |
          cd detectors/llm_judge && pip install -e ".[dev]" && pytest -q
          cd ../pii             && pip install -e ".[dev]" && pytest -q
          cd ../safety          && pip install -e ../llm_judge && pip install -e ".[dev]" && pytest -q
          cd ../nli             && pip install -e ../llm_judge && pip install -e ".[dev]" && pytest -q
      - name: Install + test automation
        run: |
          cd automation && pip install -e ../detectors/llm_judge && pip install -e ".[dev]" && pytest -q

  console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Typecheck + build
        run: |
          cd console
          npm ci
          npm run typecheck
          npm run build

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint chart
        run: helm lint deploy/helm
      - name: Template render
        run: helm template guardx deploy/helm > /dev/null

  latency:
    # Runs the k6 gate against docker-compose. This is what fails a PR when a
    # regression pushes the deterministic tier over the 30ms budget.
    runs-on: ubuntu-latest
    needs: [go, python]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Boot compose stack
        run: |
          docker compose -f deploy/compose/docker-compose.yml up --build -d
          # Poll until the gateway is ready (up to 2 min).
          for i in $(seq 1 60); do
            curl -fsS http://localhost:8081/healthz && break
            sleep 2
          done
      - name: Seed a policy so the gateway has something to enforce
        run: ./harness/m1_demo.sh
      - name: Install k6
        run: |
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6
      - name: Run latency gate
        run: ./deploy/k6/latency_gate.sh
      - name: Compose down
        if: always()
        run: docker compose -f deploy/compose/docker-compose.yml down -v

# hipaa@1.0.0 — HIPAA §164.312 posture.
#
# PHI redaction on both directions, evidence limited to spans (never full text),
# LLM safety on the standard taxonomy with tighter specialized-advice guard
# because medical mis-advice is the #1 HIPAA-adjacent harm from LLMs.
apiVersion: guardx/v1
kind: Profile
metadata:
  id: hipaa
  version: 1.0.0
  parent: baseline@1.0.0
  labels:
    framework: HIPAA-164.312
    tier: industry
spec:
  applies_to:
    apps: ["*"]
    environments: ["*"]
  defaults:
    fail_mode: closed
    timeout_ms: 12000
  guards:
    - id: g-pii-io
      scenario: pii
      detector: presidio-ensemble@1.4.0
      direction: [input, output]     # PHI is bidirectional risk
      config:
        entity_pack: healthcare-us@1.0
        language: en
      threshold: 0.7
      on_fail: redact                 # HIPAA prefers redact over block for continuity of care
      evidence: spans                 # spec §4.4: PII policies never write full_text

    - id: g-safety-io
      scenario: content_safety
      detector: safety-ensemble@1.3.0
      direction: [input, output]
      config:
        rubric: safety_llamaguard@1.0.0
        category_thresholds:
          S1: 0.5
          S3: 0.4
          S4: 0.2       # CSAM — very tight
          S6: 0.3       # specialized medical advice — very tight
          S9: 0.5
          S11: 0.3      # self-harm — very tight given patient population
      threshold: 0.5
      on_fail: block
      evidence: spans

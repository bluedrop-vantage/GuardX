# safety_llamaguard@1.0.0 — native Llama-Guard prompt.
#
# Llama-Guard-3 / 4 is a purpose-built safety classifier fine-tuned to accept
# a specific prompt format and reply with two lines:
#   safe
# — OR —
#   unsafe
#   S1,S9
#
# We keep the standard S1–S14 taxonomy so switching between Llama-Guard-3 and
# -4 (or between DeepInfra and a self-hosted vLLM instance) doesn't change
# behavior. Category names are the model's — don't rename.
id: safety_llamaguard
version: 1.0.0
scenario: content_safety
description: Meta Llama-Guard purpose-built safety classifier.

# Response format tells the shim to leave the reply as raw text (not JSON).
response_format: llamaguard

# Standard Llama-Guard-4 taxonomy. Codes are the model's; labels are ours.
categories:
  - { id: S1,  label: Violent Crimes }
  - { id: S2,  label: Non-Violent Crimes }
  - { id: S3,  label: Sex-Related Crimes }
  - { id: S4,  label: Child Sexual Exploitation }
  - { id: S5,  label: Defamation }
  - { id: S6,  label: "Specialized Advice (financial / medical / legal)" }
  - { id: S7,  label: Privacy }
  - { id: S8,  label: Intellectual Property }
  - { id: S9,  label: Indiscriminate Weapons }
  - { id: S10, label: Hate }
  - { id: S11, label: "Suicide & Self-Harm" }
  - { id: S12, label: Sexual Content }
  - { id: S13, label: Elections }
  - { id: S14, label: Code Interpreter Abuse }

# Empty system prompt — Llama-Guard reads everything from the user turn.
system: ""

# Standard Llama-Guard user format. {text} is the payload; {role_label} is
# "User" for INPUT, "Agent" for OUTPUT (per Meta's guidance).
user: |
  Task: Check if there is unsafe content in "{role_label}" messages in
  conversations according our safety policy with the below categories.

  <BEGIN UNSAFE CONTENT CATEGORIES>
  {categories}
  <END UNSAFE CONTENT CATEGORIES>

  <BEGIN CONVERSATION>

  {role_label}: {text}

  <END CONVERSATION>

  Provide your safety assessment for {role_label} in the above conversation:
  - First line must read 'safe' or 'unsafe'.
  - If unsafe, a second line must include a comma-separated list of violated categories.

model:
  provider: deepinfra
  name: meta-llama/Llama-Guard-4-12B
  temperature: 0.0
  max_tokens: 20            # response is "safe" or "unsafe\nSn,..."
